<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Nathan Metens</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="../navbar/navbar.css">
    <link rel="stylesheet" href="../links&scripts/background.css">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script defer src="contact.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-md"></nav>

    <main class="contact-page container">
        <section class="contact-card">
            <h1 class="page-title">Contact</h1>

            <p class="page-intro">
                I’m interested in software engineering, backend, systems, and security-focused opportunities. Feel free to reach out!
            </p>

            <form id="contact-form" class="contact-form" action="#" method="post">
                <div class="form-row-custom">
                    <div class="form-group">
                        <label for="first-name">Your Name</label>
                        <input type="text" class="form-control" id="first-name" name="first-name" placeholder="Your name">
                    </div>

                    <div class="form-group">
                        <label for="email">Your Email</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="email@example.com">
                    </div>
                </div>

                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea class="form-control" id="message" name="message" rows="6" placeholder="Write your message here..."></textarea>
                </div>

                <div class="button-row">
                    <input id="submit-btn" type="submit" class="action-button primary" value="Send Message">
                </div>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <p>© Nathan Metens</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
